sources:
  "22.1.7":
    # LLVM >=22 no longer publishes the split per-component source tarballs
    # (llvm-*.src.tar.xz / cmake-*.src.tar.xz). Only the full monorepo is
    # released, so we fetch llvm-project-*.src.tar.xz and use its llvm/ and
    # cmake/ subdirectories (see source() in conanfile.py).
    "llvm-project":
      url: https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.7/llvm-project-22.1.7.src.tar.xz
      sha256: 5cc4a3f12bba50b6bdfb4b61bdc852117a0ff2517807c3902fc13267fb93562e

patches:
  "22.1.7":
    - patch_file: patches/22x/0000-cmake-dependencies.patch
      patch_description: fix references to third party libs to match conan variables and targets
      patch_type: conan
      base_path: llvm-main
