name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview without making changes"
        required: false
        type: boolean
        default: false

jobs:
  release:
    if: github.repository == 'EndstoneMC/dwarf2cpp'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version from pyproject.toml: $VERSION"

      - name: Validate version
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          if git tag -l "v$VERSION" | grep -q .; then
            echo "::error::Tag v$VERSION already exists — bump the version in pyproject.toml"
            exit 1
          fi

      - name: Extract unreleased changelog
        run: |
          BODY=$(sed -n '/^## \[Unreleased\]/,/^## \[/{/^## \[/d; p}' CHANGELOG.md)
          BODY=$(echo "$BODY" | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -z "$BODY" ]; then
            echo "::error::Unreleased section in CHANGELOG.md is empty"
            exit 1
          fi
          echo "$BODY" > /tmp/release_body.md
          echo "Extracted changelog:"
          echo "$BODY"

      - name: Preview
        if: inputs.dry_run
        run: |
          DATE=$(date -u +%Y-%m-%d)
          echo "=== Dry Run ==="
          echo "Version: $VERSION"
          echo "Tag: v$VERSION"
          echo "Date: $DATE"
          echo ""
          echo "=== Release Body ==="
          cat /tmp/release_body.md
          echo ""
          echo "=== CHANGELOG.md will become ==="
          echo "## [Unreleased]"
          echo ""
          echo "## [$VERSION] - $DATE"

      - name: Update CHANGELOG.md
        if: ${{ !inputs.dry_run }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md

      - name: Commit and tag
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Release $VERSION"
          git tag "v$VERSION"

      - name: Push
        if: ${{ !inputs.dry_run }}
        run: |
          git push origin main
          git push origin "v$VERSION"

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            printf '\n**Full Changelog**: https://github.com/%s/compare/%s...v%s\n' \
              "${{ github.repository }}" "$PREV_TAG" "$VERSION" >> /tmp/release_body.md
          fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file /tmp/release_body.md

  build_wheels:
    if: ${{ !inputs.dry_run }}
    needs: [ release ]
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-14 ]
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ matrix.os }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ matrix.os }}-

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_SKIP: "*-win32 *-manylinux_i686"
          CIBW_CONTAINER_ENGINE: "docker; create_args: --volume /home/runner/.conan2:/root/.conan2"

      # The Linux container writes the Conan cache as root; reclaim ownership so
      # the actions/cache post-step (running as the runner user) can save it.
      - name: Reclaim Conan cache ownership
        if: always() && runner.os == 'Linux'
        run: sudo chown -R "$(id -u):$(id -g)" ~/.conan2

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}
          path: wheelhouse/*.whl

      - name: Attach wheels to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ needs.release.outputs.version }}" wheelhouse/*.whl

  make_sdist:
    if: ${{ !inputs.dry_run }}
    needs: [ release ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz

      - name: Attach sdist to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ needs.release.outputs.version }}" dist/*.tar.gz

  publish:
    if: ${{ !inputs.dry_run }}
    needs: [ build_wheels, make_sdist ]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v7
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
